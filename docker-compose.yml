services:
  # ── nginx SSL termination ─────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: finsight_nginx
    restart: unless-stopped
    ports:
      - "3000:3000"   # HTTPS frontend
      - "8000:8000"   # HTTPS backend API
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

  # ── FastAPI Backend (internal port 8001) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsight_backend
    restart: unless-stopped
    # NOT exposed to host — nginx handles external HTTPS:8000
    expose:
      - "8001"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - ./ml_models:/ml_models
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsight_celery
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - ./ml_models:/ml_models
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2

  # ── Celery Beat ───────────────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finsight_beat
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app beat --loglevel=info

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finsight_redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ── Next.js Frontend (internal port 3001) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://localhost:8000/api/v1}
        NEXT_PUBLIC_ZERODHA_API_KEY: ${NEXT_PUBLIC_ZERODHA_API_KEY:-}
    container_name: finsight_frontend
    restart: unless-stopped
    # NOT exposed to host — nginx handles external HTTPS:3000
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://localhost:8000/api/v1}
    depends_on:
      - backend

volumes:
  redis_data:
